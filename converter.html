<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カラー変換ツール</title>

<style>
body {
  font-family: sans-serif;
  padding: 30px;
  background: #f5f5f5;
}
.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
.result {
  margin-top: 20px;
}
.color-box {
  width: 60px;
  height: 60px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
}
</style>

</head>
<body>

<div class="container">

<h2>カラー変換ツール</h2>

<!-- HEX -->
<label>HEXカラー</label>
<input id="hex" placeholder="#C87850">
<button onclick="convertFromHex()">HEXから変換</button>

<!-- 日本塗料 -->
<label>日本塗料（例: 22-90D）</label>
<input id="jp" placeholder="22-90D">
<button onclick="convertFromJP()">日本塗料から変換</button>

<!-- マンセル -->
<label>マンセル（例: 2.5Y9/2）</label>
<input id="munsell" placeholder="2.5Y9/2">
<button onclick="convertFromMunsell()">マンセルから変換</button>

<div id="result" class="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
