<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カラー変換ツール</title>

<style>
body {
  font-family: sans-serif;
  padding: 30px;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-top: 10px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  font-size: 16px;
  background: #333;
  color: #fff;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #555;
}

.result {
  margin-top: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.color-box {
  width: 60px;
  height: 60px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
}
</style>

</head>

<body>

<div class="container">

  <h2>カラー変換ツール</h2>

  <!-- HEX入力 -->
  <label>HEXカラー</label>
  <input id="hex" placeholder="#C87850">

  <button onclick="convertColor()">変換</button>

  <!-- 結果 -->
  <div id="result" class="result"></div>

</div>

<!-- JS読み込み -->
<script src="app.js"></script>

</body>
</html>
